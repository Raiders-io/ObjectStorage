services:
## Object Storage
  api-object-storage:
    container_name: api-object-storage
    build: 
      context: ./API-ObjectStorage
    environment:
      - API_PORT=${API_PORT:?}
      - HOST=${HOST:?}
      - LOG_LEVEL=${LOG_LEVEL:?}
      - APP_KEY=${APP_KEY:?}
      - APP_URL=${APP_URL:?}
      - SESSION_DRIVER=${SESSION_DRIVER:?}
    networks:
      - basic-network
    ports:
      - "3333:${API_PORT:?}" #default port is 3333
    volumes:
      - ./API-ObjectStorage/tmp:/app/tmp # WIP DB is stored in tmp now
    restart: always

  garage:
    container_name: object-storage
    image: dxflrs/garage:v2.0.0
    command: /garage server
    environment:
      - GARAGE_DEFAULT_ACCESS_KEY=${GARAGE_DEFAULT_ACCESS_KEY:?}
      - GARAGE_DEFAULT_SECRET_KEY=${GARAGE_DEFAULT_SECRET_KEY:?}
      - GARAGE_DEFAULT_BUCKET=${GARAGE_DEFAULT_BUCKET:?}
      - GARAGE_RUST_LOG=${GARAGE_RUST_LOG:?}
    # ports: # Expose ports only in dev mode, not in production
      # - "3900:3900"   # S3 API
      # - "3903:3903"   # Admin API
    volumes:
      - ./garage-data:/var/lib/garage/data #TODO : Should be placed elsewhere in production, and should be a named volume
      - ./ObjectStorage/Garage/garage.toml:/etc/garage.toml #Needs to be generated with generate_garage_toml.sh
    networks:
      - basic-network
    restart: unless-stopped

networks:
  basic-network:
    driver: bridge
    internal: false
